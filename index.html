<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nested</title>
<style>
  :root {
    --bg: #ffffff;
    --fill: #f0f0f2;
    --ink: #1d1d1f;
    --ink-2: #86868b;
    --blue: #0071e3;
    --star: #ff9f0a;
    --hair: rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --fill: #1c1c1e;
      --ink: #f5f5f7;
      --ink-2: #8a8a8f;
      --blue: #0a84ff;
      --star: #ffd60a;
      --hair: rgba(255,255,255,.12);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font: 17px/1.6 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
  }
  button, input { font-family: inherit; color: inherit; }
  button { cursor: pointer; background: none; border: none; padding: 0; }

  .wrap { max-width: 600px; margin: 0 auto; padding: 22px 22px 90px; }

  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .brand { font-size: 15px; font-weight: 600; color: var(--ink-2); letter-spacing: -0.01em; }
  .brand:hover { color: var(--ink); }
  .starbtn { color: var(--ink-2); display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; }
  .starbtn:hover { background: var(--fill); color: var(--ink); }
  .starbtn.active { color: var(--star); }

  /* search (iOS filled style) */
  .search { position: relative; }
  .search input {
    width: 100%; padding: 14px 16px 14px 46px; font-size: 18px;
    background: var(--fill); border: none; border-radius: 13px; letter-spacing: -0.01em;
  }
  .search input::placeholder { color: var(--ink-2); }
  .search input:focus { outline: 2px solid var(--blue); outline-offset: 0; }
  .search .ico { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--ink-2); pointer-events: none; }

  .hint { margin: 18px 2px 0; color: var(--ink-2); font-size: 15px; }
  .hint .ex { color: var(--blue); margin-right: 4px; }
  .hint .ex:hover { text-decoration: underline; }

  /* dive trail */
  .trail { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; margin: 26px 2px 0; font-size: 14px; }
  .trail:empty { display: none; }
  .trail .step { color: var(--ink-2); padding: 2px 4px; border-radius: 6px; }
  .trail .step:hover { color: var(--blue); }
  .trail .step.cur { color: var(--ink); font-weight: 600; }
  .trail .sep { color: var(--ink-2); opacity: .5; }

  /* word view — borderless reading */
  .entry { margin-top: 22px; }
  .head { display: flex; align-items: center; gap: 12px; }
  .head h1 { margin: 0; font-size: 40px; font-weight: 700; letter-spacing: -0.03em; }
  .phon { color: var(--ink-2); font-size: 17px; }
  .say { color: var(--blue); display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; }
  .say:hover { background: var(--fill); }
  .say:active { transform: scale(.9); }

  .pos { margin: 26px 0 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-2); }
  ol { margin: 0; padding-left: 20px; }
  ol li { margin: 8px 0; }
  ol li::marker { color: var(--ink-2); font-size: 14px; }
  .eg { color: var(--ink-2); margin-top: 3px; }
  .eg::before { content: "\201C"; } .eg::after { content: "\201D"; }
  .sim { margin-top: 14px; font-size: 15px; color: var(--ink-2); }

  .w { cursor: pointer; text-decoration: underline; text-decoration-color: transparent; text-underline-offset: 3px; transition: color .1s, text-decoration-color .1s; }
  .w:hover { color: var(--blue); text-decoration-color: currentColor; }

  /* saved list */
  .saved { margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--hair); }
  .saved:not(.open) { display: none; }
  .saved h2 { margin: 0 0 12px; font-size: 14px; font-weight: 600; color: var(--ink-2); text-transform: uppercase; letter-spacing: .05em; }
  .saved .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--fill); border-radius: 999px; padding: 6px 14px; font-size: 15px; }
  .chip:hover { color: var(--blue); }
  .saved .none { color: var(--ink-2); font-size: 15px; }

  .msg { margin-top: 40px; text-align: center; color: var(--ink-2); font-size: 16px; }
  .spin { display: inline-block; width: 15px; height: 15px; border: 2px solid var(--hair); border-top-color: var(--blue); border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>

<div class="wrap">
  <div class="top">
    <button class="brand" onclick="reset()">Nested</button>
    <button class="starbtn" id="starTop" title="Saved words" onclick="toggleSaved()">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3.5l2.5 5.6 6.1.6-4.6 4 1.4 6L12 16.6 6.6 19.7l1.4-6-4.6-4 6.1-.6z"/></svg>
    </button>
  </div>

  <div class="search">
    <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
    <input id="q" placeholder="Look up a word" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="search" />
  </div>

  <div class="saved" id="saved"><h2>Saved</h2><div class="chips" id="savedList"></div></div>

  <nav class="trail" id="trail"></nav>
  <main id="stage"></main>
</div>

<script>
const API = "https://api.dictionaryapi.dev/api/v2/entries/en/";
const MAX_SAVED = 500;
const EXAMPLES = ["serendipity", "ephemeral", "resilience"];
const $ = s => document.querySelector(s);
const stage = $("#stage"), trailEl = $("#trail");

let trail = [], current = null;
const cache = new Map();

const store = {
  get list(){ try { return JSON.parse(localStorage.nst || "[]"); } catch { return []; } },
  set list(v){ localStorage.nst = JSON.stringify(v.slice(0, MAX_SAVED)); },
  has(w){ return this.list.includes(w); },
  toggle(w){ const l = this.list; this.list = l.includes(w) ? l.filter(x => x !== w) : [w, ...l]; },
};

$("#q").addEventListener("keydown", e => { if (e.key === "Enter") { const w = $("#q").value.trim(); if (w) dig(w); } });

function reset() { trail = []; current = null; $("#q").value = ""; renderTrail(); stage.innerHTML = hint(); $("#saved").classList.remove("open"); $("#q").focus(); }
function hint() { return `<p class="hint">Tap a word inside any definition to dive deeper. Try ${EXAMPLES.map(w => `<button class="ex" onclick="dig('${w}')">${w}</button>`).join(", ")}</p>`; }

async function dig(word, opts={}) {
  word = word.toLowerCase().replace(/[^a-z'-]/g, "");
  if (!word) return;
  if (!opts.back) { const i = trail.indexOf(word); trail = i >= 0 ? trail.slice(0, i + 1) : [...trail, word]; }
  $("#q").value = word;
  $("#saved").classList.remove("open");
  renderTrail();
  await load(word);
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goTo(i) { trail = trail.slice(0, i + 1); renderTrail(); load(trail[i]); }

function renderTrail() {
  trailEl.innerHTML = "";
  trail.forEach((w, i) => {
    if (i) { const s = document.createElement("span"); s.className = "sep"; s.textContent = "›"; trailEl.appendChild(s); }
    const b = document.createElement("button");
    b.className = "step" + (i === trail.length - 1 ? " cur" : "");
    b.textContent = w; b.onclick = () => goTo(i);
    trailEl.appendChild(b);
  });
}

async function load(word) {
  stage.innerHTML = `<p class="msg"><span class="spin"></span>Looking up “${word}”…</p>`;
  try {
    let data = cache.get(word);
    if (!data) { const r = await fetch(API + encodeURIComponent(word)); if (!r.ok) throw 0; data = await r.json(); cache.set(word, data); }
    current = { word, data };
    render(word, data);
  } catch {
    stage.innerHTML = `<p class="msg">No entry for “<b>${word}</b>”. Try the base form of the word.</p>`;
  }
}

function render(word, data) {
  const phon = (data[0].phonetics || []).map(p => p.text).find(Boolean) || data[0].phonetic || "";
  const audio = (data[0].phonetics || []).map(p => p.audio).find(Boolean) || "";

  let html = `<div class="entry"><div class="head">
    <h1>${word}</h1>
    ${phon ? `<span class="phon">${phon}</span>` : ""}
    <button class="say" title="Pronounce" onclick="speak('${word}','${audio}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8.5a5 5 0 010 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>`;

  data.forEach(entry => (entry.meanings || []).forEach(m => {
    html += `<div class="pos">${m.partOfSpeech || ""}</div><ol>`;
    (m.definitions || []).slice(0, 5).forEach(d => {
      html += `<li>${clickable(d.definition)}`;
      if (d.example) html += `<div class="eg">${clickable(d.example)}</div>`;
      html += `</li>`;
    });
    html += `</ol>`;
    const syns = (m.synonyms || []).slice(0, 8);
    if (syns.length) html += `<div class="sim">Similar: ${syns.map(s => `<span class="w">${s}</span>`).join(", ")}</div>`;
  }));
  html += `</div>`;

  stage.innerHTML = html;
  stage.querySelectorAll(".w").forEach(el => el.onclick = () => dig(el.dataset.w || el.textContent));
  syncStar();
}

function clickable(t) { return t.replace(/[A-Za-z][A-Za-z'-]*/g, m => `<span class="w" data-w="${m.toLowerCase()}">${m}</span>`); }

function speak(word, audio) {
  if (audio) new Audio(audio.startsWith("//") ? "https:" + audio : audio).play().catch(() => tts(word));
  else tts(word);
}
function tts(word) { if (!window.speechSynthesis) return; const u = new SpeechSynthesisUtterance(word); u.lang = "en-US"; u.rate = .95; speechSynthesis.cancel(); speechSynthesis.speak(u); }

// top-right star = save the CURRENT word (or open the saved list when idle)
function toggleSaved() {
  if (current) { store.toggle(current.word); syncStar(); }
  else { $("#saved").classList.toggle("open"); renderSavedList(); }
}
function syncStar() {
  const btn = $("#starTop");
  btn.classList.toggle("active", current && store.has(current.word));
  btn.title = current ? (store.has(current.word) ? "Saved — tap to remove" : "Save this word") : "Saved words";
  renderSavedList();
}
function renderSavedList() {
  const l = store.list;
  $("#savedList").innerHTML = l.length ? l.map(w => `<button class="chip" onclick="dig('${w}')">${w}</button>`).join("") : `<span class="none">Star a word to save it.</span>`;
}

// right-click / long-press the star to open the saved list even while viewing a word
$("#starTop").addEventListener("contextmenu", e => { e.preventDefault(); $("#saved").classList.toggle("open"); renderSavedList(); });

reset();
Object.assign(window, { dig, goTo, speak, toggleSaved, reset });
</script>
