<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nested</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --ink: #1d1d1f;
    --ink-2: #6e6e73;
    --ink-3: #a1a1a6;
    --accent: #0071e3;
    --accent-bg: #eaf2fd;
    --star: #f5a623;
    --hair: rgba(0,0,0,.09);
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 12px 34px rgba(0,0,0,.07);
    --ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Helvetica Neue", Arial, sans-serif;
    --serif: "New York", ui-serif, Georgia, "Times New Roman", serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --ink: #f5f5f7;
      --ink-2: #a1a1a6;
      --ink-3: #6c6c70;
      --accent: #0a84ff;
      --accent-bg: #10233a;
      --star: #ffd426;
      --hair: rgba(255,255,255,.11);
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--ui); -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
  button, input { font-family: inherit; color: inherit; }
  button { cursor: pointer; background: none; border: none; padding: 0; }

  /* state visibility */
  .hero { display: none; }
  .app { display: none; }
  body.home .hero { display: flex; }
  body.viewing .app { display: block; }

  /* shared search field */
  .search { position: relative; width: 100%; }
  .search .ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }
  .search input {
    width: 100%; padding: 14px 16px 14px 46px; font-size: 17px; color: var(--ink);
    background: var(--surface); border: 1px solid var(--hair); border-radius: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04); letter-spacing: -0.01em; transition: border-color .15s, box-shadow .15s;
  }
  .search input::placeholder { color: var(--ink-3); }
  .search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-bg); }

  /* ---------- HOME ---------- */
  .hero { min-height: 100svh; flex-direction: column; align-items: center; justify-content: center;
          text-align: center; padding: 24px 24px 12vh; }
  .hero .mark { display: flex; align-items: center; gap: 11px; font-size: 34px; font-weight: 600; letter-spacing: -0.03em; }
  .hero .mark .g { color: var(--accent); font-size: 30px; }
  .hero .sub { margin: 14px 0 30px; color: var(--ink-2); font-size: 18px; line-height: 1.5; max-width: 330px; }
  .hero .search { max-width: 440px; }
  .hero .egs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .pill { background: var(--surface); border: 1px solid var(--hair); border-radius: 999px; padding: 7px 15px; font-size: 14px; color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.03); }
  .pill:hover { border-color: var(--accent); color: var(--accent); }

  /* ---------- VIEWING ---------- */
  .app { max-width: 660px; margin: 0 auto; padding: 0 22px 120px; }
  .bar { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 14px;
         padding: 14px 0 13px; background: var(--bg); border-bottom: 1px solid var(--hair); }
  .brand { font-size: 15px; font-weight: 600; color: var(--ink-2); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  .brand .g { color: var(--accent); }
  .brand:hover { color: var(--ink); }
  .bar .search { flex: 1; }
  .bar .search input { padding: 10px 14px 10px 40px; font-size: 15px; border-radius: 11px; }
  .bar .search .ico { left: 13px; }
  .star { color: var(--ink-3); display: grid; place-items: center; width: 36px; height: 36px; border-radius: 50%; flex: none; }
  .star:hover { background: var(--surface); color: var(--ink); }
  .star.on { color: var(--star); }

  .trail { display: flex; align-items: center; flex-wrap: wrap; gap: 3px; margin: 18px 0 0; font-size: 13px; }
  .trail:empty { display: none; }
  .trail .step { color: var(--ink-2); padding: 3px 5px; border-radius: 6px; }
  .trail .step:hover { color: var(--accent); }
  .trail .step.cur { color: var(--ink); font-weight: 600; }
  .trail .sep { color: var(--ink-3); }

  .entry { background: var(--surface); border: 1px solid var(--hair); border-radius: 20px; box-shadow: var(--shadow); padding: 30px 32px 32px; margin-top: 18px; }
  .head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .head h1 { margin: 0; font-family: var(--serif); font-weight: 600; font-size: 42px; letter-spacing: -0.02em; line-height: 1.1; }
  .phon { color: var(--ink-2); font-size: 17px; font-family: var(--serif); }
  .say { align-self: center; color: var(--accent); background: var(--accent-bg); display: grid; place-items: center; width: 38px; height: 38px; border-radius: 50%; margin-left: auto; flex: none; transition: transform .1s; }
  .say:hover { filter: brightness(.97); }
  .say:active { transform: scale(.9); }

  .pos { margin: 28px 0 10px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-3); }
  ol { margin: 0; padding-left: 24px; font-family: var(--serif); }
  ol li { margin: 11px 0; font-size: 18px; line-height: 1.6; }
  ol li::marker { color: var(--ink-3); font-size: 15px; font-family: var(--ui); }
  .eg { color: var(--ink-2); font-style: italic; margin-top: 5px; }
  .eg::before { content: "\201C"; } .eg::after { content: "\201D"; }
  .sim { margin-top: 16px; font-family: var(--ui); font-size: 14.5px; color: var(--ink-2); }
  .sim .lbl { color: var(--ink-3); }
  .src { margin-top: 24px; font-family: var(--ui); font-size: 12px; color: var(--ink-3); }

  .w { cursor: pointer; text-decoration: underline; text-decoration-color: transparent; text-underline-offset: 3px; transition: color .12s, text-decoration-color .12s; }
  .w:hover { color: var(--accent); text-decoration-color: currentColor; }

  .sheet { background: var(--surface); border: 1px solid var(--hair); border-radius: 16px; box-shadow: var(--shadow); padding: 18px 20px; margin-top: 16px; }
  .sheet:not(.open) { display: none; }
  .sheet h2 { margin: 0 0 12px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3); }
  .sheet .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .sheet .none { color: var(--ink-3); font-size: 14px; }

  .msg { text-align: center; color: var(--ink-2); font-size: 16px; padding: 60px 0; }
  .spin { display: inline-block; width: 15px; height: 15px; border: 2px solid var(--hair); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -2px; margin-right: 7px; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>

<body class="home">

<section class="hero">
  <div class="mark"><span class="g">◎</span> Nested</div>
  <p class="sub">Learn a language by diving through its own words.</p>
  <div class="search">
    <span class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
    <input id="q" placeholder="Look up a word" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="search" />
  </div>
  <div class="egs" id="egs"></div>
</section>

<div class="app">
  <header class="bar">
    <button class="brand" onclick="reset()"><span class="g">◎</span> Nested</button>
    <div class="search">
      <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
      <input id="q2" placeholder="Look up a word" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="search" />
    </div>
    <button class="star" id="star" title="Save" onclick="toggleStar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3.5l2.5 5.6 6.1.6-4.6 4 1.4 6L12 16.6 6.6 19.7l1.4-6-4.6-4 6.1-.6z"/></svg>
    </button>
  </header>

  <div class="sheet" id="sheet"><h2>Saved</h2><div class="chips" id="savedList"></div></div>
  <nav class="trail" id="trail"></nav>
  <main id="stage"></main>
</div>

<script>
const API = "https://api.dictionaryapi.dev/api/v2/entries/en/";
const WIK = "https://en.wiktionary.org/api/rest_v1/page/definition/";
const MAX_SAVED = 500;
const EXAMPLES = ["serendipity", "ephemeral", "resilience", "nuance"];
const $ = s => document.querySelector(s);
const q = $("#q"), q2 = $("#q2"), stage = $("#stage"), trailEl = $("#trail");

let trail = [], current = null;
const cache = new Map();

const store = {
  get list(){ try { return JSON.parse(localStorage.nst || "[]"); } catch { return []; } },
  set list(v){ localStorage.nst = JSON.stringify(v.slice(0, MAX_SAVED)); },
  has(w){ return this.list.includes(w); },
  toggle(w){ const l = this.list; this.list = l.includes(w) ? l.filter(x => x !== w) : [w, ...l]; },
};

$("#egs").innerHTML = EXAMPLES.map(w => `<button class="pill" onclick="dig('${w}')">${w}</button>`).join("");
[q, q2].forEach(el => el.addEventListener("keydown", e => { if (e.key === "Enter") { const v = el.value.trim(); if (v) dig(v); } }));

function reset() { trail = []; current = null; q.value = ""; q2.value = ""; renderTrail(); stage.innerHTML = ""; $("#sheet").classList.remove("open"); document.body.className = "home"; q.focus(); }

async function dig(word, opts={}) {
  word = word.replace(/[^A-Za-z'-]/g, "");
  if (!word) return;
  if (!opts.back) { const i = trail.indexOf(word); trail = i >= 0 ? trail.slice(0, i + 1) : [...trail, word]; }
  q.value = word; q2.value = word;
  document.body.className = "viewing";
  $("#sheet").classList.remove("open");
  renderTrail();
  await load(word);
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goTo(i) { trail = trail.slice(0, i + 1); renderTrail(); load(trail[i]); }

function renderTrail() {
  trailEl.innerHTML = "";
  if (trail.length < 2) return;                 // no redundant single-word crumb
  trail.forEach((w, i) => {
    if (i) { const s = document.createElement("span"); s.className = "sep"; s.textContent = "›"; trailEl.appendChild(s); }
    const b = document.createElement("button");
    b.className = "step" + (i === trail.length - 1 ? " cur" : "");
    b.textContent = w; b.onclick = () => goTo(i);
    trailEl.appendChild(b);
  });
}

async function load(word) {
  stage.innerHTML = `<p class="msg"><span class="spin"></span>Looking up “${word}”…</p>`;
  try {
    let entry = cache.get(word);
    if (!entry) { entry = await fetchEntry(word); cache.set(word, entry); }
    current = { word, data: entry.data };
    render(word, entry.data, entry.source);
  } catch {
    stage.innerHTML = `<div class="entry"><p class="msg" style="padding:20px 0">No entry for “<b>${word}</b>”. Try the base form of the word.</p></div>`;
    current = null; syncStar();
  }
}

async function fetchEntry(word) {
  const cands = [...new Set([word, word.toLowerCase(), cap(word)])];
  for (const c of cands) { const r = await fetch(API + encodeURIComponent(c)); if (r.ok) return { data: await r.json(), source: "dict" }; }
  for (const c of cands) { const w = await fetch(WIK + encodeURIComponent(c)); if (!w.ok) continue; const data = parseWik(await w.json()); if (data) return { data, source: "wik" }; }
  throw 0;
}
function cap(w) { return w ? w[0].toUpperCase() + w.slice(1) : w; }
function parseWik(j) {
  const en = (j.en || []).filter(b => (b.definitions || []).some(d => strip(d.definition).trim()));
  if (!en.length) return null;
  return [{ phonetics: [], phonetic: "", meanings: en.map(b => ({
    partOfSpeech: (b.partOfSpeech || "").toLowerCase(),
    definitions: b.definitions.map(d => ({ definition: strip(d.definition), example: (d.examples && d.examples[0]) ? strip(d.examples[0]) : null })).filter(d => d.definition.trim()),
    synonyms: [],
  })) }];
}
function strip(html) { const t = document.createElement("div"); t.innerHTML = html || ""; return (t.textContent || "").trim(); }

function render(word, data, source) {
  const phon = (data[0].phonetics || []).map(p => p.text).find(Boolean) || data[0].phonetic || "";
  const audio = (data[0].phonetics || []).map(p => p.audio).find(Boolean) || "";

  let html = `<div class="entry"><div class="head">
    <h1>${word}</h1>
    ${phon ? `<span class="phon">${phon}</span>` : ""}
    <button class="say" title="Pronounce" onclick="speak('${word}','${audio}')">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M16 8.5a5 5 0 010 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>`;

  data.forEach(entry => (entry.meanings || []).forEach(m => {
    html += `<div class="pos">${m.partOfSpeech || ""}</div><ol>`;
    (m.definitions || []).slice(0, 5).forEach(d => {
      html += `<li>${clickable(d.definition)}`;
      if (d.example) html += `<div class="eg">${clickable(d.example)}</div>`;
      html += `</li>`;
    });
    html += `</ol>`;
    const syns = (m.synonyms || []).slice(0, 8);
    if (syns.length) html += `<div class="sim"><span class="lbl">Similar </span>${syns.map(s => `<span class="w">${s}</span>`).join(", ")}</div>`;
  }));
  if (source === "wik") html += `<p class="src">via Wiktionary</p>`;
  html += `</div>`;

  stage.innerHTML = html;
  stage.querySelectorAll(".w").forEach(el => el.onclick = () => dig(el.dataset.w || el.textContent));
  syncStar();
}

function clickable(t) { return t.replace(/[A-Za-z][A-Za-z'-]*/g, m => `<span class="w" data-w="${m}">${m}</span>`); }

function speak(word, audio) {
  if (audio) new Audio(audio.startsWith("//") ? "https:" + audio : audio).play().catch(() => tts(word));
  else tts(word);
}
function tts(word) { if (!window.speechSynthesis) return; const u = new SpeechSynthesisUtterance(word); u.lang = "en-US"; u.rate = .95; speechSynthesis.cancel(); speechSynthesis.speak(u); }

function toggleStar() {
  if (current) { store.toggle(current.word); syncStar(); }
  else { $("#sheet").classList.toggle("open"); renderSaved(); }
}
function syncStar() {
  const btn = $("#star");
  const on = current && store.has(current.word);
  btn.classList.toggle("on", !!on);
  btn.querySelector("svg path").setAttribute("fill", on ? "currentColor" : "none");
  renderSaved();
}
$("#star").addEventListener("contextmenu", e => { e.preventDefault(); $("#sheet").classList.toggle("open"); renderSaved(); });
function renderSaved() {
  const l = store.list;
  $("#savedList").innerHTML = l.length ? l.map(w => `<button class="pill" onclick="dig('${w}')">${w}</button>`).join("") : `<span class="none">Star a word to save it here.</span>`;
}

reset();
Object.assign(window, { dig, goTo, speak, toggleStar, reset });
</script>
